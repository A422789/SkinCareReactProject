services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skincare_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      # Persist server logs
      - logs:/app/logs
    environment:
      - NODE_ENV=production
      - CHROMIUM_PATH=/usr/bin/chromium

volumes:
  logs:
    driver: local
